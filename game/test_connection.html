<!DOCTYPE html>
<html>
<head>
    <title>Test WebSocket</title>
</head>
<body>
    <h1>Тест соединения с игрой</h1>
    <button onclick="testWS()">Проверить WebSocket</button>
    <button onclick="createRoom()">Создать комнату</button>
    <div id="result"></div>
    
    <script>
        async function createRoom() {
            try {
                const response = await fetch('http://127.0.0.1:8000/api/rooms/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        host_nickname: "ТестовыйИгрок",
                        max_rounds: 5
                    })
                });
                const data = await response.json();
                console.log('Комната создана:', data);
                document.getElementById('result').innerHTML = 
                    `Комната создана! Код: ${data.room_code}, ID игрока: ${data.player_id}`;
                
                // Тестируем WebSocket с полученными данными
                testWSWithParams(data.room_code, data.player_id);
            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('result').innerHTML = 'Ошибка создания комнаты';
            }
        }
        
        function testWS() {
            testWSWithParams('12345', 1);
        }
        
        function testWSWithParams(roomCode, playerId) {
            const ws = new WebSocket(`ws://127.0.0.1:8000/ws/${roomCode}/${playerId}`);
            
            ws.onopen = () => {
                console.log('Соединение установлено!');
                document.getElementById('result').innerHTML += 
                    '<br>✅ WebSocket соединение установлено!';
            };
            
            ws.onmessage = (event) => {
                console.log('Получено сообщение:', event.data);
            };
            
            ws.onerror = (error) => {
                console.error('Ошибка WebSocket:', error);
                document.getElementById('result').innerHTML += 
                    '<br>❌ Ошибка WebSocket соединения';
            };
            
            ws.onclose = () => {
                console.log('Соединение закрыто');
            };
        }
    </script>
</body>
</html>
